<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Punjabi Curry House – Coming Soon</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=Lato:wght@300;400;700&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --red: #C0121A;
    --gold: #F5A800;
    --white: #FFFFFF;
    --dark: #1a0505;
    --cream: #FFF8EC;
    --gold-30: rgba(245,168,0,0.3);
    --gold-40: rgba(245,168,0,0.4);
    --white-05: rgba(255,255,255,0.05);
    --white-35: rgba(255,255,255,0.35);
    --white-50: rgba(255,255,255,0.5);
    --white-75: rgba(255,255,255,0.75);
  }

  body {
    background-color: var(--dark);
    color: var(--white);
    font-family: 'Lato', sans-serif;
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* Combined gradient background */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background:
      radial-gradient(ellipse 80% 60% at 50% 0%, rgba(192,18,26,0.55) 0%, transparent 70%),
      radial-gradient(ellipse 60% 40% at 80% 100%, rgba(245,168,0,0.2) 0%, transparent 60%),
      radial-gradient(ellipse 40% 30% at 10% 80%, rgba(192,18,26,0.25) 0%, transparent 60%);
    pointer-events: none;
    z-index: 0;
  }

  /* Diagonal grid overlay — uses a single gradient, no repeat-X/Y combo */
  body::after {
    content: '';
    position: fixed;
    inset: 0;
    background-image:
      repeating-linear-gradient(45deg, rgba(245,168,0,0.03) 0px 1px, transparent 1px 40px),
      repeating-linear-gradient(-45deg, rgba(245,168,0,0.03) 0px 1px, transparent 1px 40px);
    pointer-events: none;
    z-index: 0;
  }

  /* ── Layout ── */
  .container {
    position: relative;
    z-index: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    padding: 2rem;
    text-align: center;
  }

  /* ── Decorative borders ── */
  .top-border,
  .bottom-border {
    position: fixed;
    left: 0;
    right: 0;
    height: 6px;
    background: linear-gradient(90deg, var(--red), var(--gold), var(--red), var(--gold), var(--red));
    z-index: 10;
  }
  .top-border    { top: 0; }
  .bottom-border { bottom: 0; }

  /* ── Logo ── */
  .logo-wrap {
    margin-bottom: 2rem;
    animation: fadeDown 1s ease forwards;
    opacity: 0;
    transform: translateY(-30px);
    will-change: opacity, transform;
  }
  .logo-wrap img {
    width: clamp(220px, 40vw, 380px);
    filter: drop-shadow(0 8px 32px rgba(245,168,0,0.35)) drop-shadow(0 2px 8px rgba(0,0,0,0.6));
  }

  /* ── Text elements ── */
  .coming-soon-label {
    font-weight: 300;
    font-size: clamp(0.75rem, 2vw, 1rem);
    letter-spacing: 0.5em;
    text-transform: uppercase;
    color: var(--gold);
    margin-bottom: 0.75rem;
    opacity: 0;
    animation: fadeUp 1s ease 0.3s forwards;
    will-change: opacity, transform;
  }

  .headline {
    font-family: 'Playfair Display', serif;
    font-size: clamp(2.5rem, 8vw, 6rem);
    font-weight: 900;
    line-height: 1;
    background: linear-gradient(135deg, #fff 40%, var(--gold) 100%);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    margin-bottom: 1rem;
    opacity: 0;
    animation: fadeUp 1s ease 0.5s forwards;
    will-change: opacity, transform;
  }

  .subheadline {
    font-size: clamp(1rem, 3vw, 1.4rem);
    font-weight: 300;
    color: var(--white-75);
    max-width: 520px;
    line-height: 1.7;
    margin-bottom: 3rem;
    opacity: 0;
    animation: fadeUp 1s ease 0.7s forwards;
    will-change: opacity, transform;
  }

  .divider {
    width: 80px;
    height: 3px;
    background: linear-gradient(90deg, transparent, var(--gold), transparent);
    margin: -0.5rem auto 1.5rem;
    opacity: 0;
    animation: fadeUp 1s ease 0.9s forwards;
    will-change: opacity, transform;
  }

  /* ── Countdown ── */
  .countdown-wrap {
    margin-bottom: 3rem;
    opacity: 0;
    animation: fadeUp 1s ease 1.1s forwards;
    will-change: opacity, transform;
  }
  .countdown-label {
    font-size: 0.75rem;
    letter-spacing: 0.4em;
    text-transform: uppercase;
    color: var(--gold);
    margin-bottom: 1.25rem;
  }
  .countdown {
    display: flex;
    gap: 1.5rem;
    justify-content: center;
    flex-wrap: wrap;
  }
  .time-block {
    display: flex;
    flex-direction: column;
    align-items: center;
    background: var(--white-05);
    border: 1px solid var(--gold-30);
    border-radius: 12px;
    padding: 1.25rem 1.5rem;
    min-width: 80px;
    backdrop-filter: blur(10px);
    position: relative;
    overflow: hidden;
  }
  .time-block::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 2px;
    background: var(--gold);
  }
  .time-num {
    font-family: 'Playfair Display', serif;
    font-size: clamp(2rem, 5vw, 3rem);
    font-weight: 700;
    color: var(--gold);
    line-height: 1;
    font-variant-numeric: tabular-nums; /* prevent layout shift */
  }
  .time-unit {
    font-size: 0.65rem;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: var(--white-50);
    margin-top: 0.4rem;
  }

  /* ── Notify form ── */
  .notify-wrap {
    width: 100%;
    max-width: 440px;
    opacity: 0;
    animation: fadeUp 1s ease 1.3s forwards;
    will-change: opacity, transform;
  }
  .notify-label {
    font-size: 0.75rem;
    letter-spacing: 0.3em;
    text-transform: uppercase;
    color: var(--white-50);
    margin-bottom: 1rem;
  }
  .notify-form {
    display: flex;
    border-radius: 50px;
    overflow: hidden;
    border: 2px solid var(--gold-40);
    background: var(--white-05);
    backdrop-filter: blur(10px);
    transition: border-color 0.3s;
  }
  .notify-form:focus-within { border-color: var(--gold); }
  .notify-form input {
    flex: 1;
    background: transparent;
    border: none;
    outline: none;
    padding: 0.9rem 1.5rem;
    color: white;
    font-family: 'Lato', sans-serif;
    font-size: 0.95rem;
  }
  .notify-form input::placeholder { color: var(--white-35); }
  .notify-form button {
    background: linear-gradient(135deg, var(--red), #8B0000);
    border: none;
    color: white;
    padding: 0.9rem 1.75rem;
    font-family: 'Lato', sans-serif;
    font-size: 0.85rem;
    font-weight: 700;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    cursor: pointer;
    border-left: 2px solid var(--gold-40);
    transition: background 0.3s;
  }
  .notify-form button:hover {
    background: linear-gradient(135deg, var(--gold), #c87800);
    color: var(--dark);
  }
  .success-msg {
    display: none;
    color: var(--gold);
    font-size: 0.9rem;
    margin-top: 0.75rem;
    letter-spacing: 0.05em;
  }
  .notify-form input.invalid { outline: 2px solid var(--red); }

  /* ── Spice + Social rows ── */
  .spice-row {
    display: flex;
    gap: 2rem;
    justify-content: center;
    margin-top: 3rem;
    font-size: 1.5rem;
    opacity: 0;
    animation: fadeUp 1s ease 1.5s forwards;
    will-change: opacity, transform;
  }
  .spice-row span {
    transition: color 0.3s, transform 0.3s;
    cursor: default;
    display: inline-block; /* needed for transform */
  }
  .spice-row span:hover { transform: scale(1.3) rotate(10deg); }

  .social-row {
    display: flex;
    gap: 1rem;
    justify-content: center;
    margin-top: 2rem;
    opacity: 0;
    animation: fadeUp 1s ease 1.7s forwards;
    will-change: opacity, transform;
  }
  .social-link {
    width: 42px;
    height: 42px;
    border-radius: 50%;
    border: 1px solid var(--gold-30);
    display: flex;
    align-items: center;
    justify-content: center;
    color: var(--white-50);
    text-decoration: none;
    font-size: 0.9rem;
    transition: border-color 0.3s, color 0.3s, background 0.3s;
  }
  .social-link:hover {
    border-color: var(--gold);
    color: var(--gold);
    background: rgba(245,168,0,0.1);
  }

  /* ── Floating particles ── */
  .spice-dot {
    position: fixed;
    border-radius: 50%;
    will-change: transform, opacity;
    animation: floatDot linear infinite;
    pointer-events: none;
  }

  /* ── Scene / ambient food elements ── */
  .curry-pot {
    position: fixed;
    font-size: 3.5rem;
    bottom: 30px;
    left: 60px;
    z-index: 3;
    pointer-events: none;
    will-change: transform;
    filter: drop-shadow(0 6px 15px rgba(0,0,0,0.5));
    opacity: 0;
    animation: potAppear 1s ease 1s forwards, potWobble 1.5s ease-in-out 2s infinite;
  }
  .chef-hat {
    position: fixed;
    font-size: 3rem;
    bottom: 20px;
    right: 80px;
    z-index: 5;
    pointer-events: none;
    will-change: transform;
    opacity: 0;
    animation: chefBob 2s ease-in-out infinite, chefAppear 1s ease 2s forwards;
    transform-origin: bottom center;
  }
  .ladle {
    position: fixed;
    font-size: 2.5rem;
    left: 90px;
    bottom: 55px;
    pointer-events: none;
    z-index: 4;
    will-change: transform, opacity;
    opacity: 0;
    animation: ladleStir 4s ease-in-out infinite;
  }

  /* Bubble pool — reuse DOM nodes */
  .bubble {
    position: fixed;
    border-radius: 50%;
    background: rgba(245,168,0,0.5);
    pointer-events: none;
    z-index: 3;
    will-change: transform, opacity;
    opacity: 0;
    animation: bubblePop 2s ease-out infinite;
  }

  /* Plate scene */
  .food-scene {
    position: fixed;
    bottom: 12px;
    left: 0;
    right: 0;
    height: 120px;
    pointer-events: none;
    overflow: hidden;
    z-index: 2;
  }
  .plate-serve {
    position: absolute;
    bottom: -10px;
    left: 50%;
    transform: translateX(-50%);
    font-size: 3rem;
    will-change: transform;
    filter: drop-shadow(0 8px 20px rgba(0,0,0,0.5));
    animation: plateSlideIn 3s cubic-bezier(0.22,1,0.36,1) forwards;
    opacity: 0;
    transition: transform 0.2s;
  }

  /* ── Keyframes ── */
  @keyframes fadeDown {
    to { opacity: 1; transform: translateY(0); }
  }
  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(20px); }
    to   { opacity: 1; transform: translateY(0); }
  }
  @keyframes floatDot {
    0%   { transform: translateY(100vh) rotate(0deg);   opacity: 0; }
    10%  { opacity: 1; }
    90%  { opacity: 1; }
    100% { transform: translateY(-20vh) rotate(720deg); opacity: 0; }
  }
  @keyframes plateSlideIn {
    0%   { transform: translateX(calc(-50% - 200px)) rotate(-15deg); opacity: 0; }
    30%  { opacity: 1; }
    60%  { transform: translateX(-50%) rotate(0deg); opacity: 1; }
    80%  { transform: translateX(-50%) rotate(0deg) scale(1.05); }
    100% { transform: translateX(-50%) rotate(0deg) scale(1); opacity: 1; }
  }
  @keyframes potAppear {
    from { transform: translateY(80px) scale(0.5); opacity: 0; }
    to   { transform: translateY(0)    scale(1);   opacity: 1; }
  }
  @keyframes potWobble {
    0%,100% { transform: rotate(-3deg) scale(1); }
    25%     { transform: rotate(3deg) scale(1.03); }
    50%     { transform: rotate(-2deg) scale(1); }
    75%     { transform: rotate(2deg) scale(1.02); }
  }
  @keyframes chefAppear {
    to { opacity: 1; }
  }
  @keyframes chefBob {
    0%,100% { transform: translateY(0)   rotate(-5deg); }
    50%     { transform: translateY(-12px) rotate(5deg); }
  }
  @keyframes ladleStir {
    0%   { transform: rotate(-40deg) scale(0.8); opacity: 0; }
    10%  { opacity: 1; }
    30%  { transform: rotate(20deg)  scale(1); }
    50%  { transform: rotate(-30deg) scale(1.05); }
    70%  { transform: rotate(15deg)  scale(1); }
    90%  { opacity: 1; }
    100% { transform: rotate(-40deg) scale(0.8); opacity: 0; }
  }
  @keyframes bubblePop {
    0%   { transform: scale(0) translateY(0);   opacity: 0.8; }
    70%  { opacity: 0.5; }
    100% { transform: scale(1.5) translateY(-60px); opacity: 0; }
  }
  @keyframes steamRise {
    0%   { transform: translateY(0)    scaleX(1)   skewX(0deg);  opacity: 0;    height: 0; }
    10%  { opacity: 0.55; }
    40%  { transform: translateY(-30px) scaleX(1.4) skewX(6deg);  opacity: 0.4;  height: 28px; }
    70%  { transform: translateY(-60px) scaleX(1.9) skewX(-5deg); opacity: 0.2;  height: 48px; }
    100% { transform: translateY(-90px) scaleX(2.4) skewX(4deg);  opacity: 0;    height: 60px; }
  }
  @keyframes potSplash {
    0%   { transform: scale(1);    opacity: 1; }
    50%  { transform: scale(1.6);  opacity: 0.8; }
    100% { transform: scale(0);    opacity: 0; }
  }
  @keyframes naanToss {
    0%   { transform: translateY(100px)  rotate(0deg)   scale(0.3); opacity: 0; }
    20%  { transform: translateY(-80px)  rotate(180deg) scale(1.2); opacity: 1; }
    50%  { transform: translateY(20px)   rotate(360deg) scale(0.9); opacity: 1; }
    70%  { transform: translateY(-40px)  rotate(480deg) scale(1);   opacity: 1; }
    100% { transform: translateY(200px)  rotate(600deg) scale(0.5); opacity: 0; }
  }
  @keyframes burstDot {
    from { opacity: 1; }
    to   { opacity: 0; }
  }

  @media (max-width: 480px) {
    .countdown { gap: 0.75rem; }
    .time-block { padding: 1rem 1.25rem; min-width: 65px; }
    .curry-pot, .chef-hat, .ladle { display: none; } /* reduce visual noise on small screens */
  }
</style>
</head>

<script>
(function () {
  'use strict';

  /* ── Utilities ── */
  const rand = (min, max) => Math.random() * (max - min) + min;
  const randInt = (min, max) => Math.floor(rand(min, max));
  const pad2 = n => String(n).padStart(2, '0');

  /* ── Countdown ── */
  const target = new Date();
  target.setDate(target.getDate() + 90);

  const els = {
    days:  document.getElementById('days'),
    hours: document.getElementById('hours'),
    mins:  document.getElementById('mins'),
    secs:  document.getElementById('secs'),
  };

  function updateCountdown() {
    const diff = target - Date.now();
    if (diff <= 0) {
      Object.values(els).forEach(el => { el.textContent = '00'; });
      clearInterval(countdownTimer);
      return;
    }
    els.days.textContent  = pad2(Math.floor(diff / 86400000));
    els.hours.textContent = pad2(Math.floor((diff % 86400000) / 3600000));
    els.mins.textContent  = pad2(Math.floor((diff % 3600000)  / 60000));
    els.secs.textContent  = pad2(Math.floor((diff % 60000)    / 1000));
  }

  updateCountdown();
  const countdownTimer = setInterval(updateCountdown, 1000);

  /* ── Email notify ── */
  const emailInput = document.getElementById('email-input');
  const successMsg = document.getElementById('success-msg');

  document.getElementById('notify-btn').addEventListener('click', function () {
    const v = emailInput.value.trim();
    if (!v || !v.includes('@')) {
      emailInput.classList.add('invalid');
      emailInput.addEventListener('input', () => emailInput.classList.remove('invalid'), { once: true });
      return;
    }
    successMsg.style.display = 'block';
    emailInput.value = '';
    // TODO: POST email to your backend here
  });

  /* ── Particles ── */
  const particleRoot = document.getElementById('particles');
  const COLORS = ['#F5A800', '#C0121A', '#ffffff'];

  for (let i = 0; i < 18; i++) {
    const dot = document.createElement('div');
    const size = rand(3, 9);
    dot.className = 'spice-dot';
    dot.style.cssText = [
      `width:${size}px`,
      `height:${size}px`,
      `left:${rand(0, 100)}vw`,
      `background:${COLORS[randInt(0, COLORS.length)]}`,
      `animation-duration:${rand(12, 27)}s`,
      `animation-delay:${rand(0, 10)}s`,
      `opacity:0.4`,
    ].join(';');
    particleRoot.appendChild(dot);
  }

  /* ── Plate cycling ── */
  const plates = ['🍛', '🥘', '🫕', '🍜', '🧆'];
  let plateIdx = 0;
  const mainPlate = document.getElementById('mainPlate');

  setInterval(() => {
    mainPlate.style.transform = 'translateX(-50%) scale(1.2)';
    setTimeout(() => {
      plateIdx = (plateIdx + 1) % plates.length;
      mainPlate.textContent = plates[plateIdx];
      mainPlate.style.transform = 'translateX(-50%) scale(1)';
    }, 200);
  }, 3000);

  /* ── Pot position helper ── */
  function getPotCenter() {
    const pot = document.querySelector('.curry-pot');
    if (!pot) return { x: 80, y: window.innerHeight - 60 };
    const r = pot.getBoundingClientRect();
    return { x: r.left + r.width / 2, y: r.top + r.height / 2 };
  }

  /* ── Arc-to-pot toss (shared by food & wok) ── */
  function tossIntoPot(emoji, startX, startY, duration) {
    const el = document.createElement('div');
    el.textContent = emoji;
    el.style.cssText = [
      'position:fixed',
      `left:${startX}px`,
      `top:${startY}px`,
      `font-size:${rand(1.6, 2.4)}rem`,
      'pointer-events:none',
      'z-index:4',
      'will-change:transform,opacity',
      'filter:drop-shadow(0 4px 8px rgba(0,0,0,0.4))',
    ].join(';');
    el.setAttribute('aria-hidden', 'true');
    document.body.appendChild(el);

    const pot = getPotCenter();
    // vector from start to pot
    const dx = pot.x - startX;
    const dy = pot.y - startY;
    // arc peak: halfway, pulled up by ~40% of the horizontal distance
    const peakX = dx * 0.5;
    const peakY = dy * 0.5 - Math.abs(dx) * 0.55;

    const frames = [
      { transform: 'translate(0,0) rotate(0deg) scale(1)',                          opacity: 0,   offset: 0 },
      { transform: 'translate(0,0) rotate(0deg) scale(1)',                          opacity: 1,   offset: 0.05 },
      { transform: `translate(${peakX}px,${peakY}px) rotate(200deg) scale(1.1)`,   opacity: 1,   offset: 0.5 },
      { transform: `translate(${dx}px,${dy}px) rotate(400deg) scale(0.35)`,        opacity: 0.8, offset: 0.92 },
      { transform: `translate(${dx}px,${dy}px) rotate(400deg) scale(0)`,           opacity: 0,   offset: 1 },
    ];

    const anim = el.animate(frames, {
      duration,
      easing: 'ease-in',
      fill: 'forwards',
    });

    // tiny splash on the pot when the item lands
    anim.addEventListener('finish', () => {
      el.remove();
      splashOnPot(pot);
    });
  }

  /* ── Splash effect on pot ── */
  function splashOnPot(pot) {
    const splashEmojis = ['💦', '✨', '🔥'];
    const s = document.createElement('div');
    s.textContent = splashEmojis[randInt(0, splashEmojis.length)];
    s.style.cssText = [
      'position:fixed',
      `left:${pot.x - 12}px`,
      `top:${pot.y - 20}px`,
      'font-size:1.4rem',
      'pointer-events:none',
      'z-index:5',
      'animation:potSplash 0.5s ease-out forwards',
    ].join(';');
    s.setAttribute('aria-hidden', 'true');
    document.body.appendChild(s);
    s.addEventListener('animationend', () => s.remove(), { once: true });
  }

  /* ── Flying food factory — tosses into pot ── */
  const foodEmojis = ['🌶️', '🧅', '🫚', '🥬', '🌿', '🫛', '🧄', '🥕'];

  function spawnFoodItem() {
    // start from random position on the right side of screen
    const startX = rand(window.innerWidth * 0.45, window.innerWidth * 0.92);
    const startY = rand(window.innerHeight * 0.1, window.innerHeight * 0.6);
    tossIntoPot(
      foodEmojis[randInt(0, foodEmojis.length)],
      startX, startY,
      randInt(1800, 3000)
    );
  }

  setTimeout(spawnFoodItem, 500);
  setTimeout(spawnFoodItem, 1500);
  setInterval(spawnFoodItem, 2500);

  /* ── Wok toss — starts near the pot, arcs up then into pot ── */
  const wokEmojis = ['🫓', '🌶️', '🧅', '🥕'];

  function wokToss() {
    const pot = getPotCenter();
    // start just above/right of the pot opening
    const startX = pot.x + rand(10, 30);
    const startY = pot.y - rand(20, 50);
    tossIntoPot(
      wokEmojis[randInt(0, wokEmojis.length)],
      startX, startY,
      randInt(1200, 2000)
    );
  }

  setTimeout(wokToss, 2000);
  setInterval(wokToss, 3000);

  /* ── Naan toss ── */
  function naanToss() {
    const el = document.createElement('div');
    el.style.cssText = [
      'position:fixed',
      'bottom:40px',
      `left:${rand(50, 80)}vw`,
      `font-size:${rand(2, 3)}rem`,
      'pointer-events:none',
      'z-index:6',
      `animation:naanToss ${rand(2, 3)}s cubic-bezier(0.2,0,0.8,1) forwards`,
      'opacity:0',
      'will-change:transform,opacity',
      'filter:drop-shadow(0 4px 12px rgba(0,0,0,0.4))',
    ].join(';');
    el.setAttribute('aria-hidden', 'true');
    el.textContent = '🫓';
    document.body.appendChild(el);
    el.addEventListener('animationend', () => el.remove(), { once: true });
  }

  setTimeout(naanToss, 3500);
  setInterval(naanToss, 4500);

  /* ── Steam from pot ── */
  function createSteam() {
    const pot = document.querySelector('.curry-pot');
    if (!pot) return;
    const r = pot.getBoundingClientRect();
    // spawn 2-3 wispy threads per call, spread across the pot mouth
    const count = randInt(2, 4);
    for (let i = 0; i < count; i++) {
      const thread = document.createElement('div');
      const offsetX = rand(-14, 14);           // spread across pot opening
      const width   = rand(4, 9);              // thin wisp
      const dur     = rand(900, 1600);         // quick evaporation
      const delay   = rand(0, 200);            // slight stagger between threads
      thread.style.cssText = [
        'position:fixed',
        `left:${r.left + r.width / 2 + offsetX}px`,
        `top:${r.top + 4}px`,                  // just inside the pot rim
        `width:${width}px`,
        'border-radius:50px',
        'background:rgba(255,255,255,0.55)',
        'filter:blur(3px)',
        'pointer-events:none',
        'z-index:4',
        'will-change:transform,opacity,height',
        `animation:steamRise ${dur}ms ease-out ${delay}ms forwards`,
      ].join(';');
      thread.setAttribute('aria-hidden', 'true');
      document.body.appendChild(thread);
      thread.addEventListener('animationend', () => thread.remove(), { once: true });
    }
  }

  // Fire immediately after pot appears, then every 300 ms for constant wisps
  setTimeout(createSteam, 2200);
  setInterval(createSteam, 300);

  /* ── Spice burst on click (throttled) ── */
  const burstColors = ['#F5A800', '#C0121A', '#fff', '#ff6b35', '#ffd700'];
  let burstThrottle = false;

  document.addEventListener('click', function (e) {
    if (burstThrottle) return;
    burstThrottle = true;
    setTimeout(() => { burstThrottle = false; }, 150);

    const frag = document.createDocumentFragment();
    for (let i = 0; i < 12; i++) {
      const dot = document.createElement('div');
      const angle = (i / 12) * 360;
      const dist  = rand(30, 80);
      const dx    = Math.cos(angle * Math.PI / 180) * dist;
      const dy    = Math.sin(angle * Math.PI / 180) * dist;
      dot.style.cssText = [
        'position:fixed',
        `left:${e.clientX}px`,
        `top:${e.clientY}px`,
        'width:8px',
        'height:8px',
        'border-radius:50%',
        `background:${burstColors[randInt(0, burstColors.length)]}`,
        'pointer-events:none',
        'z-index:9999',
        'will-change:transform,opacity',
      ].join(';');
      dot.animate([
        { transform: 'translate(0,0) scale(1)', opacity: 1 },
        { transform: `translate(${dx}px,${dy}px) scale(0)`, opacity: 0 },
      ], { duration: randInt(600, 900), easing: 'ease-out', fill: 'forwards' })
        .addEventListener('finish', () => dot.remove());
      frag.appendChild(dot);
    }
    document.body.appendChild(frag);
  });

})();
</script>
</body>
</html>
